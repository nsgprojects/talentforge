version: '3.9'

services:

  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: talentforge_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB:       talentforge
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d talentforge"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── pgAdmin (optional GUI) ───────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: talentforge_pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@talentforge.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools   # only starts with: docker compose --profile tools up

volumes:
  postgres_data:
    name: talentforge_postgres_data
